<script>
    function getTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        return savedTheme;
    }
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function setTheme(theme) {
    const htmlElement = document.documentElement;
    // 先移除所有可能的主题类
    htmlElement.classList.remove('light', 'dark');

    if (theme === 'dark') {
        htmlElement.classList.add('dark');
    } else if (theme === 'light') {
        htmlElement.classList.add('light');
    } else {
        // 自动模式
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (isDark) {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.add('light');
        }
    }
    localStorage.setItem('theme', theme);
    updateThemeIcon(theme);
}

function updateThemeIcon(theme) {
    const themeToggle = document.getElementById('theme-toggle');
    const iconClass = theme === 'dark' ? 'i-carbon-moon' :
        theme === 'light' ? 'i-carbon-sun' :
            'i-carbon-screen';
    themeToggle.innerHTML = `<div class="${iconClass} w-4 h-4 text-muted-foreground/70 dark:text-muted-foreground-dark/70"></div>`;
}

document.addEventListener('DOMContentLoaded', function () {
    const theme = getTheme();
    setTheme(theme);

    // 监听系统主题变化
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (localStorage.getItem('theme') === 'auto') {
            setTheme('auto');
        }
    });
});

document.addEventListener('DOMContentLoaded', function () {
    const navMenu = document.getElementById('nav-menu');
    const navTitle = document.getElementById('nav-title');
    let lastScrollY = window.scrollY;
    const scrollThreshold = 100; // 滚动阈值

    function updateNav() {
        const currentScrollY = window.scrollY;

        if (currentScrollY > scrollThreshold) {
            navMenu.style.opacity = '0';
            navMenu.style.pointerEvents = 'none';
            navTitle.style.opacity = '1';
            navTitle.style.pointerEvents = 'auto';
        } else {
            navMenu.style.opacity = '1';
            navMenu.style.pointerEvents = 'auto';
            navTitle.style.opacity = '0';
            navTitle.style.pointerEvents = 'none';
        }

        lastScrollY = currentScrollY;
    }

    window.addEventListener('scroll', updateNav);
    updateNav();
});
</script>

        <script>document.addEventListener('DOMContentLoaded', function () {
    const loadingScreen = document.getElementById('loading-screen');
    let loadingTimeout;

    function hideLoading() {
        if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 400);
        }
        if (loadingTimeout) {
            clearTimeout(loadingTimeout);
            loadingTimeout = null;
        }
    }

    function showLoading() {
        if (loadingScreen) {
            loadingScreen.style.display = 'flex';
            // 强制重排以确保过渡动画生效
            loadingScreen.offsetHeight;
            loadingScreen.style.opacity = '1';
            
            // 设置超时保护，最多显示3秒
            loadingTimeout = setTimeout(hideLoading, 3000);
        }
    }

    // 页面加载完成时隐藏
    window.addEventListener('load', hideLoading);

    // 处理浏览器返回按钮
    window.addEventListener('pageshow', function(event) {
        // 如果是从缓存加载的页面，也需要隐藏加载动画
        if (event.persisted) {
            hideLoading();
        }
    });

    // 页面跳转时显示
    document.addEventListener('click', function (e) {
        const link = e.target.closest('a');
        if (link &&
            link.href &&
            !link.href.startsWith('#') &&
            !link.href.includes('#') &&
            link.href !== window.location.href &&
            !link.hasAttribute('download') &&
            link.target !== '_blank' &&
            link.hostname === window.location.hostname) {

            e.preventDefault(); // 阻止默认跳转
            showLoading();

            // 延迟跳转
            setTimeout(() => {
                window.location.href = link.href;
            }, 500);
        }
    });

    // 初始隐藏加载动画（以防万一）
    hideLoading();
});</script>
    
</footer>
